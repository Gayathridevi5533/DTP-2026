<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}">
    <title>Student Login</title>
</head>

<body>

    <h1>Student Login</h1>

    {% if error %}
        <p class="error-message">
            {{ error }}
        </p>
    {% endif %}

    <form method="POST">

        <input
            type="text"
            name="username"
            placeholder="Username"
        >

        <br><br>

        <input
            type="password"
            name="password"
            placeholder="Password"
        >

        <br><br>

        <button type="submit">
            Login
        </button>

    </form>

    <br><br>

<a href="/forgot_password">
    Forgot Password?
</a>

</body>

</html>
