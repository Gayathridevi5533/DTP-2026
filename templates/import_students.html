<!DOCTYPE html>
<html>

<head>
    <title>Import Students</title>
</head>

<body>

    <h1>Import Student Roll</h1>

    <form
        method="POST"
        enctype="multipart/form-data"
    >

        <input
            type="file"
            name="csv_file"
            accept=".csv"
            required
        >

        <button type="submit">
            Import CSV
        </button>

    </form>

</body>

</html>
