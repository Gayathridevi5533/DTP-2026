<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <title>Student Sign Up | Burnside High School</title>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
        <img class="logo-img" src="{{ url_for('static', filename='images/logo.png') }}" alt="Burnside High School">
  </nav>


  <!-- Sign Up Section -->
  <section class="signup-section">
    <div class="signup-container">

      <div class="image-side">
        <img src="{{ url_for('static', filename='images/hero.jpg') }}" alt="School hero image">
      </div>

      <div class="form-side">
        <div class="form-card">
          <h1>Create Account</h1>

          <form class="signup-form" method="POST">

            <label for="username">Full Name</label>
            <input
              type="text"
              id="username"
              name="username"
              placeholder="Enter your full name"
              required
            >

            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="Email"
              required
            >

            <label for="student_code">Student ID</label>
            <input
              type="text"
              id="student_code"
              name="student_code"
              placeholder="Student ID"
              maxlength="5"
              required
            >

            <label for="password">Password</label>
            <div class="password-box">
              <input
                type="password"
                id="password"
                name="password"
                placeholder="Password"
                required
              >
              <span onclick="togglePassword()">👁</span>
            </div>

            <button type="submit">Sign Up</button>

          </form>
        </div>
      </div>

    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-links">
      <a href="#">Enrolment</a>
      <a href="#">Absences</a>
      <a href="#">Uniform</a>
      <a href="#">Vacancies</a>
    </div>
    <div class="socials">
      <a href="#">f</a>
      <a href="#">◎</a>
      <a href="#">▶</a>
    </div>
    <div class="footer-credit">Created by ✦ hail</div>
  </footer>

  <script>
    function togglePassword() {
      const pw = document.getElementById('password');
      pw.type = pw.type === 'password' ? 'text' : 'password';
    }
  </script>

</body>
</html>
