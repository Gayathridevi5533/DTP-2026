<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}">

    <title>Student Sign Up</title>
</head>

<body>

    <h1>Create Account</h1>

    <form method="POST">

        <input
            type="text"
            name="username"
            pattern="[A-Za-z ]+"
            title="Please enter your real name using letters only"
            required
        >

        <br><br>
        

        <input
            type="email"
            name="email"
            placeholder="Email"
            required
        >  
        <br><br>  
        

        <input
            type="text"
            name="student_code"
            placeholder="Student ID"
            required
            pattern="[0-9]{1,6}"
            title="Student ID must contain only numbers and be at most 6 digits."
        >
        <br><br>

        <div class="password-container">

            <input
                type="password"
                id="password"
                name="password"
                placeholder="Password"
            >

            <span class="toggle-password"
                onclick="togglePassword()">
                👁️
            </span>

        </div>

        <br><br>

        <button type="submit">
            Sign Up
        </button>

    </form>

    <script>
    function togglePassword() {

        let passwordBox =
            document.getElementById("password");

        if (passwordBox.type === "password") {
            passwordBox.type = "text";
        }
        else {
            passwordBox.type = "password";
        }
    }
    </script>

</body>

</html>
